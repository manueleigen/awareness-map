story_points:
  - id: intro #area-selection
    type: point-selection-quiz
    title_key: challenges.flood.fire_brigade.challenge.intro.title
    question_key: challenges.flood.fire_brigade.challenge.intro.question
    target: "#layer-emergency_calls"
    slider_time_layer: flood_simulation
    slider_time: "14:00"
    slider_time_fixed: false
    activeLayerIds: [emergency_calls]
    solution: ["flood_emergency_call_01", "flood_emergency_call_02"]
    wrong_options: ["flood_emergency_call_03"]
    minSelection: 2
    maxSelection: 2
    step: 1
    total_steps: 1
    next:
      right: win-screen
      half: half-fail-screen
      half-wrong: half-wrong-screen
      wrong-neutral: fail-screen-wrong-neutral
      all-neutral: fail-screen-all-neutral
      all-wrong: fail-screen-1

  - id: win-screen
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.win.title
    description_key: challenges.flood.fire_brigade.challenge.intro.win.description
    continue_button_key: challenges.common.restart
    activeLayerIds: [emergency_calls]
    terminalStatus: passed
    next: intro

  - id: half-fail-screen
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.half-fail.title
    description_key: challenges.flood.fire_brigade.challenge.intro.half-fail.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: half-wrong-screen
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.half-wrong.title
    description_key: challenges.flood.fire_brigade.challenge.intro.half-wrong.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: fail-screen-wrong-neutral
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.wrong-neutral.title
    description_key: challenges.flood.fire_brigade.challenge.intro.wrong-neutral.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: fail-screen-all-neutral
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.all-neutral.title
    description_key: challenges.flood.fire_brigade.challenge.intro.all-neutral.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: fail-screen-1
    type: info
    title_key: challenges.flood.fire_brigade.challenge.intro.fail.title
    description_key: challenges.flood.fire_brigade.challenge.intro.fail.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro
