story_points:
  - id: intro
    type: quiz
    title_key: challenges.flood.crisis_staff.challenge.intro.title
    question_key: challenges.flood.crisis_staff.challenge.intro.question
    activeLayerIds: [social_media_crises]
    options:
      - label_key: challenges.flood.crisis_staff.challenge.intro.optionA
        value: a
      - label_key: challenges.flood.crisis_staff.challenge.intro.optionB
        value: b
    solution: ["b"]
    next:
      right: coord-selection
      wrong: fail-screen-1
    minAnswers: 1
    maxAnswers: 1
    step: 1
    total_steps: 3

  - id: coord-selection
    type: location-quiz
    title_key: challenges.flood.crisis_staff.challenge.coord-selection.title
    question_key: challenges.flood.crisis_staff.challenge.coord-selection.question
    submit_key: challenges.flood.crisis_staff.challenge.coord-selection.submit
    activeLayerIds: [social_media_crises]
    target: "#layers"
    solution:
      x: 2414
      y: 757
    maxDistance: 400
    step: 2
    total_steps: 3
    success_screen:
      title_key: challenges.flood.crisis_staff.challenge.coord-selection.win.title
      description_key: challenges.flood.crisis_staff.challenge.coord-selection.win.description
    next:
      right: who-you-wanna-call
      wrong: fail-screen-2

  - id: who-you-wanna-call
    type: quiz
    title_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.title
    question_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.question
    activeLayerId: drone_feed
    options:
      - label_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.optionA
        value: a
      - label_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.optionB
        value: b
    solution: ["a"]
    next:
      right: win-screen
      wrong: fail-screen-3
    minAnswers: 1
    maxAnswers: 1
    step: 3
    total_steps: 3

  - id: win-screen
    type: info
    title_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.win.title
    description_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.win.description
    continue_button_key: challenges.common.restart
    activeLayerId: drone_feed
    terminalStatus: passed
    next: intro

  - id: fail-screen-1
    type: info
    title_key: challenges.flood.crisis_staff.challenge.intro.fail.title
    description_key: challenges.flood.crisis_staff.challenge.intro.fail.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: fail-screen-2
    type: info
    title_key: challenges.flood.crisis_staff.challenge.coord-selection.fail.title
    description_key: challenges.flood.crisis_staff.challenge.coord-selection.fail.description
    continue_button_key: challenges.common.restart
    terminalStatus: failed
    next: intro

  - id: fail-screen-3
    type: info
    title_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.fail.title
    description_key: challenges.flood.crisis_staff.challenge.who-you-wanna-call.fail.description
    continue_button_key: challenges.common.restart
    activeLayerId: drone_feed
    terminalStatus: failed
    next: intro

  ### Legacy / Unused
  - id: select-drone-drop-off
    type: point-selection-quiz
    title_key: challenges.flood.crisis_staff.challenge.location.title
    question_key: challenges.flood.crisis_staff.challenge.location.question_detail
    target: "#layer-critical_sites"
    selector: ".poi-marker"
    activeLayerId: critical_sites
    # usesResultFrom: free-coord-selection (Logic will look at previous point's result)
    solution: ["critical_site_2"]

    success_screen:
      title_key: challenges.flood.crisis_staff.challenge.success_interlude.title
      description_key: challenges.flood.crisis_staff.challenge.success_interlude.description
      duration_ms: 900
    next:
      right: quiz-who-you-wanna-call
      wrong: fail-screen
    minSelection: 1
    maxSelection: 1
    step: 3
    total_steps: 3
