<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awareness-Map</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./src/modules/dotlottie-wc.js" type="module"></script>
    <script type="module" src="./dist/js/app.js"></script>
</head>
<body>


    <div id="app">
        <div id="layers"></div>

        <div id="info-box">
            <div id="info-box-head">
                <div id="language-switch">
                    <span data-i18n="navigation.languages.en">English</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider round"></span>
                    </label>
                    <span data-i18n="navigation.languages.de">Deutsch</span>
                </div>
                <div id="escape-btn" data-i18n="navigation.escape"></div>
            </div>
            
            
            <div id="info-box-content"></div>
            <div id="info-box-controls"></div>
        </div>

        <div id="layer-control"></div>
        <div id="slider">
            <div class="slidecontainer">
                <input type="range" min="1" max="100" value="50" class="slider" id="time-slider">
            </div>
        </div>

    </div>
</body>
</html>
