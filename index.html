<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Awareness-Map</title>
		<!-- Content-Security-Policy: only allow scripts from this origin and unpkg CDN -->

		<link rel="stylesheet" href="./css/style.css" />
		<script
			src="./src/modules/dotlottie/dotlottie-wc.js"
			type="module"
		></script>
		<script type="module" src="./dist/js/app.js"></script>
	</head>
	<body>
		<div id="app">
			<!-- Edge Guard: blocks accidental touches at screen edges; toggled via .hidden -->
			<div id="edge-guard" class="hidden">
				<div class="edge-guard edge-guard--info-box"></div>
				<div class="edge-guard edge-guard--layer-toggles"></div>
				<div class="edge-guard edge-guard--time-slider"></div>
				<div class="edge-guard edge-guard--top"></div>
				<div class="edge-guard edge-guard--right"></div>
				<div class="edge-guard edge-guard--bottom"></div>
				<div class="edge-guard edge-guard--left"></div>
			</div>

			<!-- Background Layer (Cover Scaling) -->
			<div id="layers-container">
				<div id="layers">
					<div id="poi-overlay-portal"></div>
				</div>
			</div>

			<!-- UI Layer (Contain Scaling) -->
			<div id="ui-container">
				<div id="info-box">
					<div id="info-box-head">
						<div id="language-switch">
							<span data-i18n="navigation.languages.en">English</span>
							<label class="switch">
								<input type="checkbox" />
								<span class="slider round"></span>
							</label>
							<span data-i18n="navigation.languages.de">Deutsch</span>
						</div>
						<div id="escape-btn">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								viewBox="0 0 22.188 22.188"
								width="22"
								height="22"
								aria-hidden="true"
							>
								<path
									fill="currentColor"
									d="M11.094 0C8.9 0 6.755.65 4.93 1.87 3.106 3.09 1.684 4.82.844 6.85.005 8.876-.215 11.106.213 13.258c.428 2.152 1.485 4.13 3.036 5.68 1.552 1.552 3.528 2.609 5.68 3.037 2.153.428 4.383.208 6.41-.631 2.027-.84 3.76-2.262 4.979-4.086 1.219-1.825 1.87-3.97 1.87-6.164-.003-2.941-1.173-5.761-3.253-7.841C16.855 1.173 14.035.003 11.094 0m0 19.415a8.322 8.322 0 0 1-4.623-1.402 8.32 8.32 0 0 1-3.064-3.735 8.32 8.32 0 0 1-.474-4.807 8.32 8.32 0 0 1 2.277-4.26 8.32 8.32 0 0 1 4.26-2.278 8.32 8.32 0 0 1 4.808.474 8.32 8.32 0 0 1 3.734 3.065 8.32 8.32 0 0 1 1.402 4.622c-.002 2.206-.88 4.321-2.44 5.881-1.56 1.56-3.675 2.437-5.88 2.44"
								/>
								<path
									fill="currentColor"
									d="M14.849 7.34a1.39 1.39 0 0 0-.981-.406 1.39 1.39 0 0 0-.98.406l-1.794 1.793-1.793-1.793a1.39 1.39 0 0 0-.98-.403 1.39 1.39 0 0 0-.978.406 1.39 1.39 0 0 0-.406.979c0 .367.144.719.403.98l1.793 1.792-1.793 1.793a1.39 1.39 0 0 0-.302.45 1.39 1.39 0 0 0 .406 1.533 1.39 1.39 0 0 0 .982.406 1.39 1.39 0 0 0 .981-.409l1.793-1.793 1.793 1.793a1.39 1.39 0 0 0 .98.404 1.39 1.39 0 0 0 .979-.406 1.39 1.39 0 0 0 .406-.979 1.39 1.39 0 0 0-.404-.98l-1.793-1.792 1.793-1.793a1.39 1.39 0 0 0 .301-.45 1.39 1.39 0 0 0-.406-1.531"
								/></svg
							><span data-i18n="navigation.escape"></span>
						</div>
					</div>
					<div id="info-box-content"></div>
					<div id="info-box-controls"></div>
				</div>
				<div id="layer-control"></div>
				<div id="slider-container"></div>
			</div>
		</div>
	</body>
</html>
