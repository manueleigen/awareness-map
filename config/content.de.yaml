home:
  title: Hast du die Lage im Blick?
  description: >
    Im Krisenfall zählt jede Information.
    Erst das Zusammenspiel verschiedener Informationsquellen ergibt ein vollständiges Lagebild.
    <br>
    <div class="spacer"></div>
    Über die Icons am rechten Bildschirmrand kannst du verschiedene Infos auf der Karte anzeigen.
    <strong>Wähle ein Szenario, das du durchspielen möchtest.</strong>

  scenario_selection_label: Wähle ein Szenario
  scenario_1: Hochwasser
  scenario_2: Blackout
  scenario_3: Veranstaltung

scenarios:
  flood:
    title: Der Fluss tritt über die Ufer
    short_title: Flut
    description: >
      <strong>Nach tagelangen Regenfällen steigt der Wasserpegel weiter an.</strong><br>
      Die Lage verändert sich schnell, und die Flutsimulation zeigt, dass in den nächsten Stunden mehrere Teile der Stadt überflutet werden.
      <br>
      <div class="spacer"></div>
      Im Krisenfall haben verschiedene Akteure unterschiedliche Aufgaben und Informationen.
      <strong>Wessen Rolle möchtest du übernehmen?</strong>
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  blackout:
    title: Der Strom fällt aus
    short_title: Blackout
    description: >
      Ein großflächiger Stromausfall beeinträchtigt Kommunikation, Versorgung und Mobilität.
      Informationen sind lückenhaft, digitale Systeme fallen teilweise aus, und Entscheidungen müssen unter hohem Zeitdruck getroffen werden.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  mass_event:
    title: Großveranstaltung
    short_title: Massen-Event
    description: >
      Eine Veranstaltung mit vielen Menschen erfordert einen ständigen Überblick über Bewegungen, Engstellen, Risiken und verfügbare Ressourcen.
      Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

challenges:
  flood:
    fire_brigade:
      title: "Feuerwehr: Notrufe priorisieren"
      intro: >
        <strong>Es ist 14:00 Uhr</strong>, das Wasser steigt unaufhaltsam.<br>
        Zahlreiche Notrufe gehen ein, doch die Ressourcen der Feuerwehr sind begrenzt: Du kannst nur noch zwei Notrufe bearbeiten.
        <br><div class="spacer"></div>
        <strong>Berücksichtige, wie schnell die Orte überflutet werden, wie viele Menschen betroffen sind und wie gut sie noch erreichbar sind</strong>,
        um deine Einsatzkräfte bestmöglich einzusetzen.
      challenge:
        intro:
          title: Einsatzkräfte entsenden
          question: >
            <strong>Wähle genau zwei Notrufe aus</strong>, die du bearbeiten möchtest.
            <br><div class="spacer"></div>
              Berücksichtige: 
            <br><div class="spacer"></div>
            <strong>
              <ul>
              <li>wie schnell die Orte überflutet werden,</li>
              <li>wie viele Menschen betroffen sind und</li>
              <li>wie gut sie noch erreichbar sind.</li>
              <ul>
            </strong>
          win:
            title: Richtig!
            description: >
              Du hast die beiden kritischsten Notrufe priorisiert und damit die meisten Menschen gerettet,
              ohne Einsatzkräfte in Gefahr zu bringen.
              <br><div class="spacer"></div>
              <strong>Gut gemacht!</strong>
          half-fail:
            title: Fast richtig
            description: >
              Du hast einen der beiden kritischen Notrufe richtig priorisiert, aber die zweite Wahl war nicht optimal.
              <br><div class="spacer"></div>
              <strong>Ein weiterer Notruf hätte mehr Leben gerettet.</strong>
          half-wrong:
            title: Halb richtig
            description: >
              Einer deiner Einsätze war richtig priorisiert —
              aber dein zweiter Einsatz war in dieser Krisenlage keine sinnvolle Nutzung knapper Ressourcen.
              <br><div class="spacer"></div>
              <strong>Überlege, welche Notrufe wirklich lebensbedrohlich sind.</strong>
          wrong-neutral:
            title: Fehlgeschlagen
            description: >
              Keiner deiner gewählten Einsätze war wirklich kritisch.
              Einer davon war in einer Flutkatastrophe eindeutig falsch gesetzt.
              <br><div class="spacer"></div>
              <strong>Bitte noch einmal überlegen!</strong>
          all-neutral:
            title: Nicht optimal
            description: >
              Deine Auswahl war nicht falsch, aber auch nicht optimal.
              <br><div class="spacer"></div>
              <strong>Die wirklich lebensbedrohlichen Notrufe wurden nicht priorisiert.</strong>
          fail:
            title: Fehlgeschlagen
            description: >
              Deine Auswahl war nicht optimal.
              <br><div class="spacer"></div>
              <strong>Wichtige Notrufe wurden übersehen, während Ressourcen in weniger kritischen Bereichen gebunden waren.</strong>
    police:
      title: Evakuierungszonen planen
      intro: >
        <strong>Es ist 13:30 Uhr.</strong> Überflutungen bedrohen dicht besiedelte Gebiete.
        <br><div class="spacer"></div>
        <strong>Da die Ressourcen der Polizei begrenzt sind, können zunächst nur zwei Zonen evakuiert werden. 
        <br><div class="spacer"></div>
        Identifiziere dicht besiedelte Gebiete mit hohem Flutrisiko,</strong>
        um möglichst viele Menschen zu schützen, ohne kritische Infrastruktur zu blockieren.

      challenge:
        intro:
          title: Evakuierungszonen wählen
          question: >
            <strong>Wähle zwei Zonen auf der Karte aus, die du evakuieren möchtest.</strong>
            <br><div class="spacer"></div>
            Berücksichtige dabei:
            <br><div class="spacer"></div>
            <strong>
            <ul>
            <li>das Flutrisiko, </li>
            <li>die Bevölkerungsdichte und </li>
            <li>die Erreichbarkeit kritischer Infrastruktur.</li>
            </strong>
          win:
            title: Richtig!
            description: >
              Hervorragend! 
              <br><div class="spacer"></div>
              <strong>Du hast die am stärksten gefährdeten Wohngebiete priorisiert und gleichzeitig die Zufahrtswege für Rettungskräfte zum Krankenhaus freigehalten.</strong>
          half-fail:
            title: Fast richtig
            description: >
              Fast richtig! Einer deiner Bereiche ist nicht so akut wie du denkst.
              <br><div class="spacer"></div>
              <strong>Eine der gewählten Zonen hätte die Ressourcen sinnvoller eingesetzt.</strong>
          half-wrong:
            title: Halb richtig
            description: >
              Eine deiner Zonen ist korrekt —
              aber die andere blockiert die Zugangsstraße zum Krankenhaus!
              <br><div class="spacer"></div>
              <strong>Kritische Infrastruktur muss erreichbar bleiben.</strong>
          wrong-neutral:
            title: Fehlgeschlagen
            description: >
              Durch die Evakuierung wird die Zugangsstraße zum Krankenhaus blockiert!
              <br><div class="spacer"></div>
              <strong>Kritische Infrastruktur muss auch im Krisenfall erreichbar bleiben.</strong>
          all-neutral:
            title: Ressourcen verschwendet
            description: >
              Du setzt deine Einsatzkräfte nicht effektiv ein und vergeudest Ressourcen.
              <br><div class="spacer"></div>
              <strong>Die wirklich gefährdeten Bereiche wurden nicht priorisiert.</strong>
          fail:
            title: Fehlgeschlagen
            description: >
              Die Evakuierungsentscheidung war nicht ausreichend.
              <br><div class="spacer"></div>
              <strong>Wichtige Zonen wurden überflutet, während Ressourcen in weniger kritischen Bereichen gebunden waren.</strong>

    crisis_staff:
      title: "Entscheiden unter Unsicherheit"
      intro: >
        <strong>Es ist 11:30 Uhr.</strong> Während der laufenden Einsatzlage kursieren auf Social Media Gerüchte über einen möglichen Bruch des Hochwasserschutzes im Bereich des Alten Hafens.
        <br><div class="spacer"></div>
        Prüfe die Informationen und <strong>überlege, ob du sofort handeln oder zunächst weitere Informationen sammeln möchtest.</strong>
      challenge:
        intro:
          title: "Wie reagierst du?"
          question: <strong>Möchtest du die aktuelle Informationslage sofort mit Öffentlichkeit, Polizei oder Feuerwehr teilen oder zunächst eine Drohne entsenden</strong>, um mehr Informationen zu sammeln und die Lage besser einzuschätzen?
          optionA: Infos teilen
          optionB: Drohne entsenden
          win:
            title: Richtig!
            description: Erst weitere Informationen sammeln.
          fail:
            title: Das war keine gute Entscheidung
            description: >
              <strong>Die frühe Kommunikation ungesicherter Informationen verstärkt Panik.</strong>
              <br><div class="spacer"></div>
              Auch das interne Teilen mit Feuerwehr und Polizei kann verfrühte oder fehlgeleitete Maßnahmen auslösen.
        coord-selection:
          title: Einsatzort der Drohne wählen
          submit: Einsatzort prüfen
          question: >
            <strong>Prüfe die Social-Media-Posts</strong>, um einzuschätzen, wo ein Bruch des Hochwasserschutzes besonders wahrscheinlich ist.
            <br><div class="spacer"></div>
            <strong>Tippe dann einen Ort auf der Karte an, um die Drohne dorthin zu senden.</strong>

          win:
            title: Richtig!
            description: >
              Du hast die Drohne in einem relevanten Gebiet eingesetzt und damit wichtige Daten über die aktuelle Lage gesammelt.
              <br><div class="spacer"></div>
              <strong>Tatsächlich wahren die Grüchte über den Alten Hafen korrekt - der Bereich ist vollständigüberschwemmt!</strong>
          fail:
            title: Fehlgeschlagen
            description: >
              Du hast die Drohne in einem irrelevanten Gebiet eingesetzt und damit wertvolle Ressourcen vergeudet.
              <br><div class="spacer"></div>
              <strong>Versuche, die Drohne in ein relevantes Gebiet zu senden.</strong>
        who-you-wanna-call:
          title: Information weiterleiten
          question: <strong>Mit wem möchtest du die gesicherte Information zuerst teilen?</strong>
          optionA: Einsatzleitung der Feuerwehr
          optionB: Öffentlichkeit
          win:
            title: Challenge gelöst!
            description: >
              Du hast die Information so weitergegeben, dass operative Einheiten besser handeln können, ohne die Lage unnötig zu verschärfen.
              <br><div class="spacer"></div>
              So wurde eine wichtige Informationslücke geschlossen, <strong>die Einsatzkräfte sind jetzt besser handlungsfähig.</strong>
          fail:
            title: Fehlgeschlagen
            description: >
              Das zu frühe Teilen der Information mit der Öffentlichkeit verstärkt Panik.
              <br><div class="spacer"></div>
              <strong>Die Einsatzkräfte brauchen dringend präzise Informationen, um eine sinnvolle Reaktion zu initiieren.</strong>


