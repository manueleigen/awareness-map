home:
  title: Hast du die Lage im Blick?
  description: >
    Im Krisenfall zählt jede Information.
    Erst das Zusammenspiel verschiedener Informationsquellen ergibt ein vollständiges Lagebild.

    Aktiviere die Datenebenen über die Icons am rechten Bildschirmrand und wähle ein Szenario, mit dem du weitermachen möchtest.
  scenario_selection_label: Wähle ein Szenario
  scenario_1: Hochwasser
  scenario_2: Blackout
  scenario_3: Veranstaltung

scenarios:
  flood:
    title: Der Fluss tritt über die Ufer
    short_title: Flut
    description: >
      Nach tagelangen Regenfällen steigt der Wasserpegel weiter an.
      Die Lage verändert sich schnell, und die Flutsimulation zeigt, dass in den nächsten Stunden mehrere Teile der Stadt überflutet werden.

      Im Krisenfall haben verschiedene Akteure unterschiedliche Aufgaben und Zugang zu unterschiedlichen Informationen.

      Wessen Rolle möchtest du übernehmen?
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  blackout:
    title: Der Strom fällt aus
    short_title: Blackout
    description: >
      Ein großflächiger Stromausfall beeinträchtigt Kommunikation, Versorgung und Mobilität.
      Informationen sind lückenhaft, digitale Systeme fallen teilweise aus, und Entscheidungen müssen unter hohem Zeitdruck getroffen werden.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  mass_event:
    title: Großveranstaltung
    short_title: Massen-Event
    description: >
      Eine Veranstaltung mit vielen Menschen erfordert einen ständigen Überblick über Bewegungen, Engstellen, Risiken und verfügbare Ressourcen.
      Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

challenges:
  flood:
    fire_brigade:
      title: "Feuerwehr: Notrufe priorisieren"
      intro: >
        Es ist 14:00 Uhr, das Wasser steigt unaufhaltsam.
        Zahlreiche Notrufe gehen ein, doch die Ressourcen der Feuerwehr sind begrenzt: Du kannst nur zwei Hotspots bearbeiten.

        Berücksichtige, wie schnell die Hotspots überflutet werden, wie viele Menschen betroffen sind und wie gut sie noch erreichbar sind,
        um deine Einsatzkräfte bestmöglich einzusetzen.
      challenge:
        intro:
          title: Hotspots wählen
          question: >
              Wähle genau zwei Hotspots aus, die du bearbeiten möchtest.
              Berücksichtige dabei, wie schnell sie überflutet werden,
              wie viele Menschen betroffen sind und wie gut sie noch erreichbar sind.
          win:
            title: Richtig!
            description: >
              Du hast die beiden kritischsten Notrufe priorisiert und damit die meisten Menschen gerettet,
              ohne Einsatzkräfte in Gefahr zu bringen.
          half-fail:
            title: Fast richtig
            description: >
              Du hast zwar einen wichtigen Bereich priorisiert, aber die zweite Wahl war nicht optimal.
              Entweder wurde ein wichtiger Notruf übersehen oder ein Bereich gewählt, der bald nicht mehr erreichbar ist.
          fail:
            title: Fehlgeschlagen
            description: >
              Deine Auswahl war nicht optimal. Wichtige Notrufe wurden übersehen, während Ressourcen in weniger kritischen Bereichen gebunden waren.
    police:
      title: Evakuierungszonen planen
      intro: >
        Es ist 13:30 Uhr. Überflutungen bedrohen dicht besiedelte Gebiete.
        Da die Ressourcen der Polizei begrenzt sind, können zunächst nur zwei Zonen evakuiert werden.
        Identifiziere dicht besiedelte Gebiete mit hohem Flutrisiko,
        um möglichst viele Menschen zu schützen, ohne kritische Infrastruktur zu blockieren.

      challenge:
        intro:
          title: Evakuierungszonen wählen
          question: >
                    Wähle zwei Zonen auf der Karte aus, die du evakuieren möchtest.
                    Berücksichtige dabei das Flutrisiko, die Bevölkerungsdichte und die Erreichbarkeit kritischer Infrastruktur.
          win:
            title: Richtig!
            description: >
              Hervorragend! Du hast die am stärksten gefährdeten Wohngebiete priorisiert und gleichzeitig die Zufahrtswege für Rettungskräfte zum Krankenhaus freigehalten.
          half-fail:
            title: Teilweise erfolgreich
            description: >
              Du hast zwar eine wichtige Zone geschützt, aber die zweite Wahl war nicht optimal.
              Entweder wurde ein dicht besiedeltes Gebiet übersehen oder eine wichtige Verkehrsader blockiert.
          fail:
            title: Fehlgeschlagen
            description: >
              Die Evakuierungsentscheidung war nicht ausreichend. Wichtige Zonen wurden überflutet, während Ressourcen in weniger kritischen Bereichen gebunden waren.

    crisis_staff:
      title: "Entscheiden unter Unsicherheit"
      intro: >
        Es ist 11:30 Uhr. Während der laufenden Einsatzlage kursieren auf Social Media Gerüchte über einen möglichen Bruch des Hochwasserschutzes im Bereich des Alten Hafens.
        Prüfe die Informationen und überlege, ob du vor weiteren Schritten erst zusätzliche Erkenntnisse sammeln möchtest.
      challenge:
        intro:
          title: "Wie reagierst du?"
          question: Möchtest du die aktuellen Informationen teilen oder eine Drohne entsenden, um die Lage besser einzuschätzen?
          optionA: Informationen teilen
          optionB: Drohne entsenden
          win:
            title: Richtig!
            description: Erst weitere Informationen sammeln.
          fail:
            title: Das war keine gute Entscheidung
            description: >
              Die frühe Kommunikation ungesicherter Informationen verstärkt Panik.
              Auch das interne Teilen mit Feuerwehr und Polizei kann verfrühte oder fehlgeleitete Maßnahmen auslösen.
        coord-selection:
          title: Einsatzort der Drohne wählen
          question: Prüfe die Social-Media-Posts, um einzuschätzen, wo ein Bruch des Hochwasserschutzes wahrscheinlich ist.
          win:
            title: Richtig!
            description: >
              Du hast die Drohne in einem relevanten Gebiet eingesetzt und wichtige Informationen für die Einsatzkräfte gewonnen.
              So konntest du die Lage besser einschätzen und eine wichtige Informationslücke schließen.
          fail:
            title: Fehlgeschlagen
            description: >
              Du hast die Drohne in einem irrelevanten Gebiet eingesetzt und damit wertvolle Ressourcen vergeudet.
        who-you-wanna-call:
          title: Information weiterleiten
          question: Mit wem möchtest du die gesicherte Information zuerst teilen?
          optionA: Einsatzleitung der Feuerwehr
          optionB: Öffentlichkeit
          win:
            title: Challenge gelöst!
            description: >
              Du hast die Information so weitergegeben, dass operative Einheiten besser handeln können, ohne die Lage unnötig zu verschärfen.
              So wurde eine wichtige Informationslücke geschlossen.
          fail:
            title: Fehlgeschlagen
            description: >
              Das zu frühe Teilen der Information mit der Öffentlichkeit verstärkt Panik.


