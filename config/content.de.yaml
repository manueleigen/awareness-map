home:
  title: Hast du die Lage im Blick?
  description: >
    Im Krisenfall ist es wichtig, basierend auf möglichst aktuellen Informationen gute Entscheidungen zu treffen.
    Oft ist dabei entscheidend, wo etwas passiert ist, wo sich viele Menschen aufhalten
    und welche Ressourcen zur Verfügung stehen. Welches Szenario möchtest du erkunden?
  scenario_selection_label: Wähle ein Szenario
  scenario_1: Hochwasser
  scenario_2: Blackout
  scenario_3: Großveranstaltung

scenarios:
  flood:
    title: Der Fluss tritt über die Ufer
    short_title: Flut
    description: >
      Durch tagelange Regenfälle kommt steigt der Wasserpegel stetig an. Es ist zu erwarten, dass
      der Fluss über die Ufer tritt und die üblichen Schutzmaßnahmen nicht ausreichen.
      Nicht alle Beteiligten haben die gleichen Informationen, und die Lage entwickelt sich schnell.
      Welche Rolle möchtest du übernehmen?
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  blackout:
    title: Der Strom fällt aus
    short_title: Blackout
    description: >
      Ein großflächiger Stromausfall beeinträchtigt Kommunikation, Versorgung und
      Mobilität. Informationen sind lückenhaft, digitale Systeme fallen teilweise aus,
      und Entscheidungen müssen unter hohem Zeitdruck getroffen werden.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  mass_event:
    title: Großveranstaltung
    short_title: Großveranstaltung
    description: >
      Eine Veranstaltung mit vielen Menschen erfordert laufenden Überblick über
      Bewegungen, Engstellen, Risiken und verfügbare Ressourcen. Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

challenges:
  common:
    passed_msg: Herausforderung erfolgreich abgeschlossen!
    failed_msg: Herausforderung leider nicht bestanden.
    retry_button: Erneut versuchen
    start_button: Herausforderung starten
  flood:
    fire_brigade:
      title: Rettung unter Zeitdruck
      headline: Rettung unter Zeitdruck
      intro: >
        Viele Notrufe gehen ein, während der Wasserstand steigt. 
        Gleiche Notrufe mit dem zeitlichen Verlauf der Überflutung ab und identifiziere
        zwei erreichbare und dringliche Hotspots.
      how-to: >
        Wähle genau zwei Hotspots aus, die du bearbeiten möchtest. 
        Berücksichtige dabei, wie schnell sie überflutet werden, 
        wie viele Menschen betroffen sind und wie erreichbar sie noch sind.
      success_feedback: >
        Du hast nicht nur auf Lautstärke reagiert, sondern das verbleibende
        Zeitfenster richtig eingeschätzt. So können Einsatzkräfte dort
        eingesetzt werden, wo sie noch wirksam helfen können.
      failure_feedback_1: Einsatzkräfte werden in Kategorie A vom Wasser überrascht.
      failure_feedback_2: Zugangsfenster schließen sich, wenn Kategorie B ignoriert wird.
      failure_feedback_3: Die Auswahl nur nicht dringlicher Hotspots macht verpasste Interventionschancen sichtbar.

    police:
      title: Evakuierung mit Folgen
      headline: Evakuierung mit Folgen
      intro: >
        Überflutungen bedrohen dicht besiedelte Gebiete. Da die Resourcen der Polizei begrenzt sind, 
        können zunächst nur zwei Zonen evakuiert werden. Identifiziere Flutrisiken und rette möglichst viele Menschen, 
        ohne kritische Infrastruktur zu blockieren oder unnötige Panik auszulösen.
      how-to: >
        Wähle zwei Zonen auf der Karte aus, die du evakuieren möchtest. Berücksichtige dabei das Flutrisiko, die Bevölkerungsdichte,
        und die Erreichbarkeit von kritischer Infrastruktur.
      success_feedback: >
        Du hast Risiko, Erreichbarkeit und Systemfolgen gemeinsam betrachtet.
        Die von dir gewählten Zonen schützen gefährdete Gebiete, ohne zentrale Verbindungen
        unnötig zu blockieren.
      failure_feedback_1: Die Zone wird überflutet und Menschen werden in Gefahr gebracht.
      failure_feedback_2: Durch die Evakuierung wird die Krankenhauszufahrte  blockiert; umliegende Bereiche zeigen zunehmende Instabilität.
      failure_feedback_3: Eine Evakuierung wird zu früh ausgelöst und Ressourcen werden vergeudet.

    crisis_staff:
      title: Entscheiden unter Unsicherheit
      headline: Entscheiden unter Unsicherheit
      intro: >
        Während der laufenden Einsatzlage kursieren auf Social Media Gerüchte über einen möglichen Deich- oder
        Hochwasserschutz-Bruch. Entscheide, welche Informationen du teilst, und reduziere die Unsicherheit, indem du aktuelle Daten erhebst.
      how-to: >
        keins?
      feedback: >
        Du kannst jederzeit Informationen teilen, zurückhalten oder neue Daten erheben. 
        Überlege, welche Informationslücken am kritischsten sind und wie du sie am besten schließen kannst, um die Einsatzkräfte zu unterstützen, ohne unnötige Panik zu verursachen.
      success_feedback: >
        Du hast Informationen so geteilt, dass operative Einheiten besser handeln
        können, ohne die Lage unnötig zu verschärfen und die Informationslücke Datenerhebung geschlossen.
      failure_feedback_1: Frühe öffentliche Kommunikation verstärkt Panik.
        Frühes internes Teilen löst verfrühte oder fehlgeleitete Vorbereitungen aus.
      failure_feedback_2: Du hast die Drohne in einem irrelevanten Gebiet eingesetzt und damit Ressourcen verschwendet.
      failure_feedback_3: Das Zurückhalten bestätigter Informationen lässt Einsatzkräfte mit veralteten Annahmen handeln.

