app:
  title: Awareness Map

navigation:
  back: Zurück
  next: Weiter
  start: Start
  close: Schließen
  restart: Neu starten
  home: Start
  scenario: Szenario
  role: Rolle

home:
  headline: Hast du die Lage im Blick?
  description: >
    Im Krisenfall ist es wichtig, basierend auf Daten gute Entscheidungen zu treffen.
    Oft ist dabei entscheidend, wo etwas passiert ist, wo sich viele Menschen aufhalten
    und welche Ressourcen zur Verfügung stehen. Wähle ein Szenario.
  scenario_selection_label: Wähle ein Szenario

scenarios:
  flood:
    title: Flut in der Stadt
    short_title: Flut
    description: >
      Durch tagelange Regenfälle tritt der Fluss über die Ufer. Es ist zu erwarten,
      dass der Wasserstand weiter steigt und die Schutzmaßnahmen nicht ausreichen.
      Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle

  blackout:
    title: Blackout
    short_title: Blackout
    description: >
      Ein großflächiger Stromausfall beeinträchtigt Kommunikation, Versorgung und
      Mobilität. Informationen sind lückenhaft, digitale Systeme fallen teilweise aus,
      und Entscheidungen müssen unter hohem Zeitdruck getroffen werden.
    role_selection_label: Wähle deine Rolle

  mass_event:
    title: Großveranstaltung
    short_title: Großveranstaltung
    description: >
      Eine Veranstaltung mit vielen Menschen erfordert laufenden Überblick über
      Bewegungen, Engstellen, Risiken und verfügbare Ressourcen. Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle

roles:
  fire_brigade:
    title: Feuerwehr
    short_description: >
      Du triffst operative Entscheidungen unter Zeitdruck und musst einschätzen,
      wo Hilfe noch wirksam und erreichbar ist.

  police:
    title: Polizei
    short_description: >
      Du koordinierst Evakuierungen und musst dafür sorgen, dass Wege nutzbar
      bleiben und kritische Infrastruktur erreichbar ist.

  crisis_staff:
    title: Krisenstab
    short_description: >
      Du behältst das Gesamtbild im Blick, reduzierst Unsicherheit und entscheidest,
      wann Informationen intern oder öffentlich geteilt werden.

role_intro:
  flood:
    fire_brigade:
      headline: Rettung unter Zeitdruck
      description: >
        Mehrere Notruf-Hotspots erscheinen, während der Wasserstand steigt.
        Einige Bereiche sind bereits zu gefährlich erreichbar, andere werden bald
        unzugänglich, wieder andere sind dringend, aber noch machbar. Du kannst
        nur zwei Hotspots bearbeiten.
      role_label: Rolle
      role_value: Operative Einheit der Feuerwehr
      task_overview_label: Deine Aufgabe
      task_overview: >
        Gleiche Notrufe mit dem zeitlichen Verlauf der Überflutung ab und wähle
        genau zwei erreichbare und dringliche Hotspots aus.
      start_button: Als Feuerwehr starten

    police:
      headline: Evakuierung mit Folgen
      description: >
        Überflutungen bedrohen dicht besiedelte Gebiete. Ein Krankenhaus ist auf
        ununterbrochene Straßenanbindung angewiesen. Mehrere Evakuierungsoptionen
        wirken ähnlich dringend, doch nur eine Zone kann festgelegt werden.
      role_label: Rolle
      role_value: Polizeiliche Evakuierungs- und Sicherheitskoordination
      task_overview_label: Deine Aufgabe
      task_overview: >
        Identifiziere ein gefährdetes Gebiet, lege eine Evakuierungszone fest
        und prüfe, ob Routen passierbar bleiben und kritische Infrastruktur
        erreichbar ist.
      start_button: Als Polizei starten

    crisis_staff:
      headline: Entscheiden unter Unsicherheit
      description: >
        Während der laufenden Einsatzlage wird ein möglicher Deich- oder
        Hochwasserschutz-Bruch gemeldet. Das Lagebild kann veraltet oder
        irreführend sein. Du musst Unsicherheit reduzieren und entscheiden,
        wann und mit wem Informationen geteilt werden.
      role_label: Rolle
      role_value: Zentrale Krisenkoordination und Entscheidungsunterstützung
      task_overview_label: Deine Aufgabe
      task_overview: >
        Identifiziere die zentrale Unsicherheit, entsende eine Drohne zur
        Datenerhebung und entscheide, wann unsichere oder bestätigte
        Informationen an Feuerwehr, Polizei oder Öffentlichkeit kommuniziert
        werden.
      start_button: Als Krisenstab starten

challenges:
  flood:
    fire_brigade:
      headline: Rettung unter Zeitdruck
      difficulty: leicht
      key_insight_label: Zentrale Erkenntnis
      key_insight: >
        Rechtzeitiges Handeln erfordert die Antizipation von Machbarkeit –
        nicht bloß die Reaktion auf hohe Anrufzahlen.
      description: >
        Mehrere Notruf-Hotspots erscheinen, während der Wasserstand steigt.
        Einige Bereiche sind bereits zu gefährlich erreichbar, andere werden bald
        unzugänglich, wieder andere sind dringend, aber noch machbar. Es können
        nur zwei Hotspots bearbeitet werden.
      tasks_label: Aufgaben
      tasks:
        - Notrufe mit dem zeitlichen Verlauf der Überflutung abgleichen.
        - Erreichbare dringliche Bereiche identifizieren.
        - Exakt zwei Hotspots auswählen.
      map_instruction: Wähle genau zwei Hotspots.
      hotspot_categories_label: Hotspot-Kategorien
      hotspot_categories:
        a:
          title: Zu spät
          description: >
            Überflutet in etwa 30 Minuten. Nicht auswählen.
          example: >
            Erdgeschosse laufen voll, Zufahrtsstraßen bereits betroffen.
        b:
          title: Jetzt oder nie
          description: >
            In etwa 120 Minuten abgeschnitten. Auswählen.
          example: >
            Einzige Zufahrtsroute, vulnerable Bewohner:innen gemeldet.
        c:
          title: Dringend, aber machbar
          description: >
            Überflutet in etwa 60 bis 90 Minuten. Einen auswählen.
          example: >
            Keller laufen voll, steigendes Wasser auf Straßen.
        d:
          title: Laut, aber nicht dringend
          description: >
            Hohes Anrufaufkommen, aber noch mindestens 120 Minuten trocken.
            Nicht auswählen.
          example: >
            Viele Anrufe, Wasser nähert sich, Gebiet noch sicher.
      success_criteria_label: Erfolgskriterien
      success_criteria:
        - Kategorie B gewählt.
        - Eine Kategorie C gewählt.
        - Kategorien A und D vermieden.
      success_feedback_label: Bei Erfolg
      success_feedback: >
        Du hast nicht nur auf Lautstärke reagiert, sondern das verbleibende
        Zeitfenster richtig eingeschätzt. So können Einsatzkräfte dort
        eingesetzt werden, wo sie noch wirksam helfen können.
      failure_feedback_label: Bei Misserfolg
      failure_feedback:
        - Einsatzkräfte werden in Kategorie A vom Wasser überrascht.
        - Zugangsfenster schließen sich, wenn Kategorie B ignoriert wird.
        - Die Auswahl nur nicht dringlicher Hotspots macht verpasste Interventionschancen sichtbar.

    police:
      headline: Evakuierung mit Folgen
      difficulty: mittel
      key_insight_label: Zentrale Erkenntnis
      key_insight: >
        Evakuierungen funktionieren nur, wenn Routen nutzbar bleiben und
        kritische Infrastruktur erreichbar ist. Starke Paniksignale weisen
        nicht zwangsläufig auf die beste Evakuierungsentscheidung hin.
      description: >
        Überflutungen bedrohen dicht besiedelte Gebiete. Ein Krankenhaus ist auf
        ununterbrochene Straßenanbindung angewiesen. Mehrere Evakuierungsoptionen
        wirken anhand von Bevölkerungszahl und Flutrisiko gleich dringend, doch
        es kann nur eine Evakuierungszone festgelegt werden.
      tasks_label: Aufgaben
      tasks:
        - Kurzfristiges Flutrisiko und Bevölkerungsdichte identifizieren.
        - Eine Evakuierungszone zeichnen.
        - Routen-Machbarkeit prüfen.
        - Auswirkungen auf Krankenhauszugang und öffentliche Reaktion berücksichtigen.
      map_instruction: Lege eine Evakuierungszone fest.
      success_criteria_label: Erfolgskriterien
      success_criteria:
        - Die Evakuierung umfasst ein Hochrisiko-Bevölkerungsgebiet.
        - Routen bleiben passierbar.
        - Der Krankenhauszugang ist gesichert.
        - Die öffentliche Reaktion bleibt beherrschbar.
      success_feedback_label: Bei Erfolg
      success_feedback: >
        Du hast Risiko, Erreichbarkeit und Systemfolgen gemeinsam betrachtet.
        Die Zone schützt ein gefährdetes Gebiet, ohne zentrale Verbindungen
        unnötig zu blockieren.
      failure_feedback_label: Bei Misserfolg
      failure_feedback:
        - Die Evakuierungszone wird isoliert und Bewegung kommt zum Stillstand.
        - Krankenhauszufahrten werden blockiert; umliegende Bereiche zeigen zunehmende Instabilität.
        - Eine Evakuierung wird zu früh ausgelöst und Ressourcen werden vergeudet.

    crisis_staff:
      headline: Entscheiden unter Unsicherheit
      difficulty: schwer
      key_insight_label: Zentrale Erkenntnis
      key_insight: >
        Lagebewusstsein ist unvollständig und muss insbesondere unter
        Unsicherheit aktiv kuratiert werden.
      description: >
        Während der laufenden Einsatzlage wird ein möglicher Deich- oder
        Hochwasserschutz-Bruch gemeldet. Das Lagebild kann veraltet oder
        irreführend sein. Der Krisenstab muss Unsicherheit reduzieren und
        entscheiden, wann und mit wem Informationen geteilt werden.
      tasks_label: Aufgaben
      tasks:
        - Hauptunsicherheit identifizieren.
        - Eine Drohne zur Datenerhebung entsenden.
        - Entscheiden, wann Informationen geteilt werden.
        - Entscheiden, an wen Informationen kommuniziert werden.
      map_instruction: Setze eine Drohne ein und entscheide über die Kommunikation.
      success_criteria_label: Erfolgskriterien
      success_criteria:
        - Die Drohne wurde im relevanten Gebiet eingesetzt.
        - Bestätigte Informationen wurden an operative Akteure geteilt.
        - Öffentliche Kommunikation vermeidet unnötige Panik.
        - Das Lagebild stabilisiert sich lokal.
      success_feedback_label: Bei Erfolg
      success_feedback: >
        Du hast die richtige Informationslücke priorisiert, Daten nacherhoben
        und Informationen so geteilt, dass operative Einheiten besser handeln
        können, ohne die Lage unnötig zu verschärfen.
      failure_feedback_label: Bei Misserfolg
      failure_feedback:
        - Frühe öffentliche Kommunikation verstärkt Panik.
        - Frühes internes Teilen löst verfrühte oder fehlgeleitete Vorbereitungen aus.
        - Das Zurückhalten bestätigter Informationen lässt Einsatzkräfte mit veralteten Annahmen handeln.

