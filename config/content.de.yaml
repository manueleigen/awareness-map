home:
  title: Hast du die Lage im Blick?
  description: >
    Im Krisenfall ist es wichtig, basierend auf möglichst aktuellen Informationen gute Entscheidungen zu treffen.
    Oft ist dabei entscheidend, wo etwas passiert ist, wo sich viele Menschen aufhalten
    und welche Ressourcen zur Verfügung stehen. Welches Szenario möchtest du erkunden?
  scenario_selection_label: Wähle ein Szenario
  scenario_1: Hochwasser
  scenario_2: Blackout
  scenario_3: Veranstaltung

scenarios:
  flood:
    title: Der Fluss tritt über die Ufer
    short_title: Flut
    description: >
      Durch tagelange Regenfälle kommt steigt der Wasserpegel stetig an. Es ist zu erwarten, dass
      der Fluss über die Ufer tritt und die üblichen Schutzmaßnahmen nicht ausreichen.
      Nicht alle Beteiligten haben die gleichen Informationen, und die Lage entwickelt sich schnell.
      Welche Rolle möchtest du übernehmen?
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  blackout:
    title: Der Strom fällt aus
    short_title: Blackout
    description: >
      Ein großflächiger Stromausfall beeinträchtigt Kommunikation, Versorgung und
      Mobilität. Informationen sind lückenhaft, digitale Systeme fallen teilweise aus,
      und Entscheidungen müssen unter hohem Zeitdruck getroffen werden.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

  mass_event:
    title: Großveranstaltung
    short_title: Großveranstaltung
    description: >
      Eine Veranstaltung mit vielen Menschen erfordert laufenden Überblick über
      Bewegungen, Engstellen, Risiken und verfügbare Ressourcen. Wähle deine Rolle.
    role_selection_label: Wähle deine Rolle
    roles:
      fire_brigade:
        title: Feuerwehr
      police:
        title: Polizei
      crisis_staff:
        title: Krisenstab

challenges:
  flood:
    fire_brigade:
      title: Rettung unter Zeitdruck
      headline: Rettung unter Zeitdruck
      intro: >
        Viele Notrufe gehen ein, während der Wasserstand steigt. 
        Gleiche Notrufe mit dem zeitlichen Verlauf der Überflutung ab und identifiziere
        zwei erreichbare und dringliche Hotspots.
      how-to: >
        Wähle genau zwei Hotspots aus, die du bearbeiten möchtest. 
        Berücksichtige dabei, wie schnell sie überflutet werden, 
        wie viele Menschen betroffen sind und wie erreichbar sie noch sind.
      challenge:
        intro:
          title: Hotspots wählen
          question: Wähle genau zwei Hotspots aus, die du bearbeiten möchtest. Berücksichtige dabei die Zeit bis zur Überflutung und die Dringlichkeit.
          win:
            title: Richtig!
            description: >
              Du hast nicht nur auf Lautstärke reagiert, sondern das verbleibende
              Zeitfenster richtig eingeschätzt. So können Einsatzkräfte dort
              eingesetzt werden, wo sie noch wirksam helfen können.
          half-fail:
            title: Teilweise erfolgreich
            description: >
              Du hast zwar eine wichtige Zone geschützt, aber die zweite Wahl war nicht optimal. Entweder wurde ein dicht besiedeltes Gebiet vergessen oder eine wichtige Verkehrsader blockiert.
          fail:
            title: Fehlgeschlagen
            description: >
              Die Auswahl war nicht optimal. Entweder wurden Einsatzkräfte in Kategorie A vom Wasser überrascht, 
              Zugangsfenster (Kategorie B) wurden ignoriert oder es wurden nur nicht dringliche Hotspots gewählt.
    police:
      title: Evakuierung mit Folgen
      headline: Evakuierung mit Folgen
      intro: >
        Überflutungen bedrohen dicht besiedelte Gebiete. Da die Resourcen der Polizei begrenzt sind, 
        können zunächst nur zwei Zonen evakuiert werden. Identifiziere Flutrisiken und rette möglichst viele Menschen, 
        ohne kritische Infrastruktur zu blockieren oder unnötige Panik auszulösen.
      how-to: >
        Wähle zwei Zonen auf der Karte aus, die du evakuieren möchtest. Berücksichtige dabei das Flutrisiko, die Bevölkerungsdichte,
        und die Erreichbarkeit von kritischer Infrastruktur.
      challenge:
        intro:
          title: Evakuierungszonen wählen
          question: >
            Die Flut steigt. Wähle die zwei Zonen aus, die am dringendsten evakuiert werden müssen, um die Bevölkerung zu schützen, ohne die Rettungswege für das Krankenhaus zu blockieren.
          win:
            title: Richtig!
            description: >
              Hervorragend! Du hast die gefährdetsten Wohngebiete priorisiert und gleichzeitig die Zufahrtswege für die Rettungskräfte zum Krankenhaus freigehalten.
          half-fail:
            title: Teilweise erfolgreich
            description: >
              Du hast zwar eine wichtige Zone geschützt, aber die zweite Wahl war nicht optimal. Entweder wurde ein dicht besiedeltes Gebiet vergessen oder eine wichtige Verkehrsader blockiert.
          fail:
            title: Fehlgeschlagen
            description: >
              Die Evakuierungsentscheidung war unzureichend. Wichtige Zonen wurden überflutet, während Ressourcen in weniger kritischen Bereichen gebunden waren.

    crisis_staff:
      title: Entscheiden unter Unsicherheit
      headline: Entscheiden unter Unsicherheit
      intro: >
        Während der laufenden Einsatzlage kursieren auf Social Media Gerüchte über einen möglichen Deich- oder Hochwasserschutz-Bruch. Entscheide, welche Informationen du teilst, und reduziere die Unsicherheit, indem du aktuelle Daten erhebst.
      how-to: keins?
      challenge:
        intro:
          title: Was ist der erste Schritt?
          question: Möchtest du Informationen über das Hochwasser teilen oder erst weitere Daten erheben.
          optionA: Informationen teilen
          optionB: Drohne entsenden
          win:
            title: Richtig!
            description: Erst Informationen sammeln.
          fail:
            title: Fehlgeschlagen
            description: >
              Frühe öffentliche Kommunikation verstärkt Panik. Frühes internes Teilen löst verfrühte oder fehlgeleitete Vorbereitungen aus.
        coord-selection:
          title: Einsatzort wählen
          question: Wähle den richtigen Ort auf der Karte aus (klicke in die Mitte).
          win:
            title: Richtig!
            description: Schauen we zuerst auf Gebiete mit hoher Bevölkerungsdichte.
          fail:
            title: Fehlgeschlagen
            description: >
              Du hast die Drohne in einem irrelevanten Gebiet eingesetzt und damit Ressourcen verschwendet.
        who-you-wanna-call:
          title: Information weiterleiten
          question: An wen sollen die Informationen weitergeleitet werden?
          optionA: Einsatzleitung der Feuerwehr
          optionB: Öffentlichkeit
          win:
            title: Challenge gelöst!
            description: >
              Du hast Informationen so geteilt, dass operative Einheiten besser handeln können, ohne die Lage unnötig zu verschärfen und die Informationslücke Datenerhebung geschlossen.
          fail:
            title: Fehlgeschlagen
            description: >
              Das Zurückhalten bestätigter Informationen lässt Einsatzkräfte mit veralteten Annahmen handeln.
