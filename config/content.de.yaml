map_ui:
  active_layer_label: Aktive Ebene
  no_active_layer: Keine aktive Ebene
  layer_panel_title: Datenebenen
  time_slider_label: Zeitverlauf
  action_label: Aktion
  confirm_action: Aktion bestätigen
  cancel_action: Abbrechen

layers:
  base_map:
    title: Stadtkarte
    description: >
      Räumlicher Kontext und Orientierung. Basis für die Interpretation aller
      anderen Ebenen.

  critical_places:
    title: Kritische Orte
    description: >
      Wichtige Referenzpunkte im Stadtgebiet. Relevant besonders für Feuerwehr
      und Krisenstab, sekundär für polizeiliche Entscheidungen.

  population_density:
    title: Bevölkerungsdichte
    description: >
      Zeigt, wo sich besonders viele Menschen aufhalten. Relevant für
      Lebensrisiko, Evakuierungsplanung und Priorisierung.

  flood_simulation:
    title: Flutsimulation
    description: >
      Zeigt die Entwicklung des Hochwassers über die Zeit und unterstützt die
      Einschätzung von Zugangsverlusten und Risiken.

  emergency_calls:
    title: Notrufe
    description: >
      Ortsbezogene Meldungen aus betroffenen Gebieten. Zentrale Eingabe für die
      Feuerwehr-Challenge.

  social_media:
    title: Social Media
    description: >
      Öffentliche Signale, Beobachtungen und Reaktionen. Besonders relevant für
      Polizei und Krisenstab.

  evacuation_zones:
    title: Evakuierungszonen
    description: >
      Markierte oder festgelegte Bereiche für Evakuierung und Schutzmaßnahmen.

  road_closures:
    title: Straßennetz / Sperrungen
    description: >
      Informationen zu Erreichbarkeit, Blockaden und kritischen Verbindungen.

  drone_feed:
    title: Drohnendaten
    description: >
      Zusätzliche Lageeinschätzung aus der Luft zur Reduktion von Unsicherheit.

  infrastructure_status:
    title: Infrastrukturstatus
    description: >
      Informationen zum Zustand wichtiger Einrichtungen und Schutzbauwerke.

feedback:
  success_title: Aufgabe erfolgreich
  failure_title: Aufgabe nicht erfolgreich
  retry: Erneut versuchen
  continue: Weiter

completion:
  headline: Lage bewertet
  description: >
    Du hast Entscheidungen auf Basis einer dynamischen und unvollständigen Lage
    getroffen. Lagebewusstsein ist nie vollständig, sondern muss aktiv hergestellt
    und laufend angepasst werden.
  restart_button: Szenario neu starten
  home_button: Zurück zur Startseite