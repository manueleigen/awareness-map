layers:
  # --- z-index: lowest (bottom) → highest (top) ---

  - id: base_layer_river
    type: static-image
    toggle: hidden
    interaction: none

  - id: flood_simulation
    type: dynamic-image
    title_key: layers.flood_simulation.title
    description_key: layers.flood_simulation.description
    toggle: available
    available_from: scenario
    interaction: timeline
    playback_control: true
    start_time: "08:00"
    end_time: "18:00"

  - id: base_layer_streets
    type: static-image
    toggle: hidden
    interaction: none

  - id: base_layer_glow
    class: glow-layer
    type: static-image
    toggle: hidden
    interaction: none

  - id: base_layer_buildings
    type: static-image
    toggle: hidden
    interaction: none

  - id: population_density
    class: blend-layer
    type: static-image
    title_key: layers.population_density.title
    description_key: layers.population_density.description
    toggle: available
    interaction: none
    opacity_control: true

  - id: evacuation_zones
    type: areas
    title_key: layers.evacuation_zones.title
    description_key: layers.evacuation_zones.description
    toggle: available
    available_from: role
    interaction: none
    opacity_control: true

  - id: critical_places
    type: locations
    title_key: layers.critical_sites.title
    description_key: layers.critical_sites.description
    toggle: available
    interaction: inspect-location
    icon_mode: per-location

  - id: social_media
    type: locations
    title_key: layers.social_media.title
    description_key: layers.social_media.description
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: emergency_calls
    type: locations
    title_key: layers.emergency_calls.title
    description_key: layers.emergency_calls.description
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: emergency_vehicles
    type: locations
    title_key: layers.emergency_vehicles.title
    description_key: layers.emergency_vehicles.description
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: drone_feed
    type: static-image
    title_key: layers.drone_feed.title
    description_key: layers.drone_feed.description
    toggle: available
    available_from: role
    interaction: inspect-area

  - id: quiz_location_marker
    type: locations
    toggle: hidden
    interaction: none

  - id: quiz_location_radius
    type: static-image
    toggle: hidden
    interaction: none
