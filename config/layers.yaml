layers:
  # --- z-index: lowest (bottom) → highest (top) ---

  - id: base_layer_river
    type: static-image
    toggle: hidden
    interaction: none

  - id: base_layer_buildings
    type: static-image
    toggle: hidden
    interaction: none

  - id: base_layer_streets
    type: static-image
    toggle: hidden
    interaction: none

  - id: base_layer_glow
    class: glow-layer
    type: static-image
    toggle: hidden
    interaction: none

  - id: critical_sites
    type: locations
    title_key: challenges.global.critical_sites.title
    toggle: available
    interaction: inspect-location
    icon_mode: per-location

  - id: population_density
    class: blend-layer
    type: static-image
    title_key: challenges.global.population_density.title
    toggle: available
    interaction: none
    opacity_control: true

  - id: emergency_vehicles
    type: locations
    title_key: challenges.scenarios.flood.roles.fire_brigade.layers.emergency_vehicles.title
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: emergency_calls
    type: locations
    title_key: challenges.scenarios.flood.roles.fire_brigade.layers.emergency_calls.title
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: social_media
    type: locations
    title_key: challenges.scenarios.flood.roles.police.layers.social_media.title
    toggle: available
    available_from: role
    interaction: inspect-location
    icon_mode: per-location

  - id: evacuation_zones
    type: areas
    title_key: challenges.scenarios.flood.roles.police.layers.evacuation_zones.title
    toggle: available
    available_from: role
    interaction: inspect-area # Kept from original to allow interaction
    opacity_control: true

  - id: flood_simulation
    type: dynamic-image
    title_key: challenges.scenarios.flood.layers.flood_simulation.title
    toggle: available
    available_from: scenario
    interaction: timeline
    playback_control: true
    start_time: "08:00"
    end_time: "18:00"

  - id: drone_feed
    type: static-image
    title_key: challenges.scenarios.flood.roles.crisis_staff.layers.drone_feed.title
    description_key: challenges.scenarios.flood.roles.crisis_staff.layers.drone_feed.description
    toggle: available
    available_from: role
    interaction: inspect-area

  # --- Internal / Quiz Layers ---
  - id: quiz_location_marker
    type: locations
    toggle: hidden
    interaction: none

  - id: quiz_location_radius
    type: static-image
    toggle: hidden
    interaction: none
