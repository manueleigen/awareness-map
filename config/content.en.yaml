home:
  title: Do You Have the Situation in View?
  description: >
    In a crisis, it is important to make good decisions based on the most current information possible.
    What often matters is where something has happened, where many people are located,
    and which resources are available. Which scenario would you like to explore?
  scenario_selection_label: Choose a scenario
  scenario_1: Flood
  scenario_2: Blackout
  scenario_3: Event

scenarios:
  flood:
    title: The River Overflows Its Banks
    short_title: Flood
    description: >
      After days of rainfall, the water level keeps rising. It is expected that
      the river will overflow its banks and that the usual protection measures will not be enough.
      Not everyone involved has the same information, and the situation is developing quickly.
      Which role would you like to take on?
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire Brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis Staff

  blackout:
    title: The Power Goes Out
    short_title: Blackout
    description: >
      A large-scale power outage affects communication, supply systems, and
      mobility. Information is incomplete, digital systems partly fail,
      and decisions must be made under high time pressure.
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire Brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis Staff

  mass_event:
    title: Mass Event
    short_title: Mass Event
    description: >
      An event with many people requires continuous awareness of
      movement, bottlenecks, risks, and available resources. Choose your role.
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire Brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis Staff

challenges:
  flood:
    fire_brigade:
      title: Rescue Under Time Pressure
      headline: Rescue Under Time Pressure
      intro: >
        Many emergency calls are coming in while the water level is rising.
        Compare emergency calls with the temporal progression of the flooding and identify
        two reachable and urgent hotspots.
      how-to: >
        Select exactly two hotspots that you want to handle.
        Consider how quickly they will be flooded,
        how many people are affected, and whether they are still reachable.
      challenge:
        intro:
          title: Select Hotspots
          question: Select exactly two hotspots you want to handle. Consider the time until flooding and urgency.
          win:
            title: Correct!
            description: >
              You did not simply react to volume, but correctly assessed the remaining
              time window. This allows response units to be deployed where
              they can still help effectively.
          half-fail:
            title: Partially successful
            description: >
              While you protected an important zone, your second choice was not optimal. Either a densely populated area was missed or a key traffic artery was blocked.
          fail:
            title: Failed
            description: >
              The selection was not optimal. Either emergency units were surprised by water in Category A, 
              access windows (Category B) were ignored, or only non-urgent hotspots were selected.
    police:
      title: Evacuation with Consequences
      headline: Evacuation with Consequences
      intro: >
        Flooding threatens densely populated areas. Since police resources are limited,
        only two zones can initially be evacuated. Identify flood risks and save as many people as possible
        without blocking critical infrastructure or triggering unnecessary panic.
      how-to: >
        Select two zones on the map that you want to evacuate. Consider the flood risk, population density,
        and the accessibility of critical infrastructure.
      challenge:
        intro:
          title: Select Evacuation Zones
          question: >
            The flood is rising. Select the two zones that most urgently need evacuation to protect the population without blocking emergency access to the hospital.
          win:
            title: Correct!
            description: >
              Excellent! You prioritized the most vulnerable residential areas while keeping emergency access routes open for the hospital.
          half-fail:
            title: Partially successful
            description: >
              While you protected an important zone, your second choice was not optimal. Either a densely populated area was missed or a key traffic artery was blocked.
          fail:
            title: Failed
            description: >
              The evacuation decision was insufficient. Critical zones were flooded while resources were tied up in less critical areas.

    crisis_staff:
      title: Deciding Under Uncertainty
      headline: Deciding Under Uncertainty
      intro: >
        During the ongoing response, rumors are circulating on social media about a possible dike or flood protection breach. Decide which information to share and reduce uncertainty by collecting current data.
      how-to: none?
      challenge:
        intro:
          title: What is the first step?
          question: Would you like to share information about the flood or collect more data first?
          optionA: Share information
          optionB: Deploy drone
          win:
            title: Correct!
            description: Collect information first.
          fail:
            title: Failed
            description: >
              Early public communication increases panic. Early internal sharing triggers premature or misdirected preparations.
        coord-selection:
          title: Choose deployment location
          question: Select the correct place on the map (click in the centre).
          win:
            title: Correct!
            description: Let's first look at areas with high population density.
          fail:
            title: Failed
            description: >
              You deployed the drone in an irrelevant area and wasted resources.
        who-you-wanna-call:
          title: Forward information
          question: To whom should the information be forwarded?
          optionA: Fire department operations center
          optionB: Public
          win:
            title: Challenge solved!
            description: >
              You shared information in a way that allows operational units to act better without unnecessarily escalating the situation and closed the information gap through data collection.
          fail:
            title: Failed
            description: >
              Withholding confirmed information leaves emergency services acting on outdated assumptions.
