home:
  title: Do you have the full picture?
  description: >
    In a crisis, every piece of information matters.
    Only the combination of different information sources creates a complete situational picture.

    Activate the data layers using the icons on the right side of the screen and choose a scenario to continue.
  scenario_selection_label: Choose a scenario
  scenario_1: Flood
  scenario_2: Blackout
  scenario_3: Event

scenarios:
  flood:
    title: The river overflows its banks
    short_title: Flood
    description: >
      After days of heavy rain, the water level continues to rise.
      The situation is changing rapidly, and the flood simulation shows that several parts of the city will be flooded in the next few hours.

      In a crisis, different actors have different tasks and access to different information.

      Which role would you like to take on?
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis staff

  blackout:
    title: The power goes out
    short_title: Blackout
    description: >
      A large-scale power outage disrupts communication, supplies, and mobility.
      Information is incomplete, digital systems are partly failing, and decisions must be made under severe time pressure.
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis staff

  mass_event:
    title: Mass event
    short_title: Mass Event
    description: >
      An event with many people requires constant oversight of movement, bottlenecks, risks, and available resources.
      Choose your role.
    role_selection_label: Choose your role
    roles:
      fire_brigade:
        title: Fire brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis staff

challenges:
  flood:
    fire_brigade:
      title: "Fire brigade: Prioritize emergency calls"
      intro: >
        It is 2:00 PM, and the water is rising relentlessly.
        Numerous emergency calls are coming in, but the fire brigade’s resources are limited: you can only handle two hotspots.

        Consider how quickly the hotspots will be flooded, how many people are affected, and how accessible they still are,
        so you can deploy your emergency units as effectively as possible.
      challenge:
        intro:
          title: Choose hotspots
          question: >
              Select exactly two hotspots that you want to handle.
              Consider how quickly they will be flooded,
              how many people are affected, and how accessible they still are.
          win:
            title: Correct!
            description: >
              You prioritized the two most critical emergency calls and saved the greatest number of people
              without putting emergency units at risk.
          half-fail:
            title: Almost correct
            description: >
              You prioritized one important area, but the second choice was not ideal.
              Either an important emergency call was overlooked or you chose an area that will soon no longer be accessible.
          fail:
            title: Failed
            description: >
              Your selection was not ideal. Important emergency calls were overlooked, while resources were tied up in less critical areas.
    police:
      title: Plan evacuation zones
      intro: >
        It is 1:30 PM. Flooding is threatening densely populated areas.
        Since police resources are limited, only two zones can be evacuated at first.
        Identify densely populated areas at high flood risk
        in order to protect as many people as possible without blocking critical infrastructure.

      challenge:
        intro:
          title: Choose evacuation zones
          question: >
                    Select two zones on the map that you want to evacuate.
                    Consider the flood risk, population density, and access to critical infrastructure.
          win:
            title: Correct!
            description: >
              Excellent! You prioritized the most vulnerable residential areas while keeping access routes to the hospital clear for emergency services.
          half-fail:
            title: Partly successful
            description: >
              You protected one important zone, but the second choice was not ideal.
              Either a densely populated area was overlooked or an important traffic route was blocked.
          fail:
            title: Failed
            description: >
              The evacuation decision was not sufficient. Important zones were flooded while resources were tied up in less critical areas.

    crisis_staff:
      title: "Deciding under uncertainty"
      intro: >
        It is 11:30 AM. During the ongoing emergency, rumors are spreading on social media about a possible breach in the flood protection system near the Old Harbor.
        Review the information and consider whether you should gather additional evidence before taking further action.
      challenge:
        intro:
          title: "How do you respond?"
          question: Would you like to share the current information or send a drone to assess the situation more accurately?
          optionA: Share information
          optionB: Send drone
          win:
            title: Correct!
            description: Gather more information first.
          fail:
            title: That was not a good decision
            description: >
              Communicating unverified information too early increases panic.
              Sharing it internally with the fire brigade and police can also trigger premature or misguided actions.
        coord-selection:
          title: Choose the drone deployment area
          question: Review the social media posts to assess where a breach in the flood protection system is most likely.
          win:
            title: Correct!
            description: >
              You deployed the drone in a relevant area and collected data about the current situation.
              The rumors about the Old Harbor turned out to be true — the area is completely flooded.
          fail:
            title: Failed
            description: >
              You deployed the drone in an irrelevant area and wasted valuable resources.
        who-you-wanna-call:
          title: Pass on information
          question: Who would you like to share the verified information with first?
          optionA: Fire brigade incident command
          optionB: Public
          win:
            title: Challenge solved!
            description: >
              You passed on the information in a way that helps operational units act more effectively without unnecessarily escalating the situation.
              This helped close an important information gap.
          fail:
            title: Failed
            description: >
              Sharing the information with the public too early increases panic.


