home:
  title: Do You Have Situational Awareness?
  description: >
    In a crisis, every piece of information counts.
    Only the combination of different information sources creates a complete situational picture.

    <div class="spacer"></div>
    Use the icons on the right side of the screen to display different types of information on the map.
    <strong>Select a scenario you would like to work through.</strong>

  scenario_selection_label: Select a scenario
  scenario_1: Flooding
  scenario_2: Blackout
  scenario_3: Public Event

scenarios:
  flood:
    title: The River Overflows Its Banks
    short_title: Flood
    description: >
      <strong>After days of heavy rainfall, the water level continues to rise.</strong>

      The situation is changing rapidly, and the flood simulation shows that several parts of the city will be inundated over the next few hours.

      <div class="spacer"></div>
      In a crisis, different actors have different responsibilities and access to different information.
      <strong>Which role would you like to take on?</strong>
    role_selection_label: Select your role
    roles:
      fire_brigade:
        title: Fire Brigade
      police:
        title: Police
      crisis_staff:
        title: Crisis Unit

  blackout:
    title: The Power Goes Out
    short_title: Blackout

  mass_event:
    title: Major Event
    short_title: Mass Event

challenges:
  flood:
    fire_brigade:
      title: "Prioritize Emergency Calls"
      intro: >
        <strong>It is 2:00 PM</strong>, and the water is rising relentlessly.

        Numerous emergency calls are coming in, but the fire department's resources are limited: <strong>You can only respond to two emergency calls.</strong>

        <div class="spacer"></div>
        Consider how many people are affected, how quickly the locations will be flooded, 
        and whether emergency responders can still reach them without being overtaken by the flood themselves.
      challenge:
        intro:
          title: Dispatch Emergency Responders
          question: >
            <strong>It is 2:00 PM. Select exactly two emergency calls.</strong>

            <div class="spacer"></div>
              Take into account: 

            <div class="spacer"></div>
            <strong>
              <ul>
              <li>how many people are affected,</li>
              <li>how quickly the locations will be flooded, and</li>
              <li>whether ambulances can still reach them safely.</li>
              <ul>
            </strong>
          win:
            title: Challenge Solved!
            description: >
              You prioritized the two most critical emergency calls and thereby saved the greatest number of people,
              without putting emergency responders at risk

              <div class="spacer"></div>
              <strong>Well done!</strong>
          half-fail:
            title: Partly Correct
            description: >
              You correctly prioritized one of the two critical emergency calls, but the other call you selected is not as urgent as you think.

              <div class="spacer"></div>
              <strong>Pay attention to which areas will be flooded very soon!</strong>
          half-wrong:
            title: Emergency Responders at Risk
            description: >
              You put your responders at risk by selecting an emergency call in an area that is already flooded.

              Your other choice was correct, and you successfully prioritized a call in an area that will be flooded soon.

              <div class="spacer"></div>

              <strong>Select a different emergency call.</strong>
          wrong-neutral:
            title: Emergency Responders at Risk
            description: >
              You put your responders at risk by selecting an emergency call in an area that is already flooded.

              Your other choice was an emergency call that is not critical, because the area will not be flooded soon and only a small number of people are affected.

              <div class="spacer"></div>
              <strong>Select two different emergency calls.</strong>
          all-neutral:
            title: Resources Wasted
            description: >
              The emergency calls you selected were not critical, because the areas will not be flooded soon and only a small number of people are affected.

              <div class="spacer"></div>
              <strong>Select two different emergency calls that affect many people and will be flooded soon.</strong>
          fail:
            title: Failed
            description: >
              Your selection was not optimal.

              <div class="spacer"></div>
              <strong>Critical emergency calls were overlooked while resources were tied up in less urgent areas.</strong>
    police:
      title: Plan Evacuation Zones
      intro: >
        <strong>It is 1:30 PM.</strong> Floodwaters are threatening densely populated areas.
        To protect the public, some districts must be evacuated.
        <strong>However, police resources are limited, and only three zones can be evacuated at first.</strong>

        <div class="spacer"></div>
        Identify densely populated areas that will soon be flooded,
        and pay attention to particularly vulnerable infrastructure.

      challenge:
        intro:
          title: Select Evacuation Zones
          question: >
            <strong>It is 1:30 PM. Select three zones on the map.</strong>
            <div class="spacer"></div>
            Take into account

            <div class="spacer"></div>
            <strong>
            <ul>
            <li>when the areas will be flooded, </li>
            <li>population density, and </li>
            <li>critical infrastructure that must be evacuated.</li>
            </strong>
          win:
            title: Challenge Solved!
            description: >
              <div class="spacer"></div>
              You prioritized the most severely threatened residential areas and took critical infrastructure into account.
          half-fail:
            title: Partly Correct
            description: >
              Not all of the zones you selected were critical, but you did prioritize at least part of the most severely threatened residential areas.

              <div class="spacer"></div>
              <strong>Focus on densely populated areas that will be flooded soon.</strong>
          all-neutral:
            title: Resources Wasted
            description: >
              None of the zones you selected were critical, because they will not be flooded soon or affect only a small number of people.

              <div class="spacer"></div>
              <strong>Focus on densely populated areas that will be flooded soon!</strong>

    crisis_staff:
      title: "Decision-Making Under Uncertainty"
      intro: >
        <strong>It is 11:30 AM.</strong> Rumors are spreading on social media about a possible breach in the flood protection system near the Old Harbor.

        <div class="spacer"></div>
        Assess the information and <strong>consider whether to act immediately or gather additional information first.</strong>
      challenge:
        intro:
          title: "How do you respond?"
          question: <strong>Would you share the current information immediately with the public, police, or fire department, or would you first deploy a drone</strong> to gather more information and assess the situation more accurately?
          optionA: Share Information
          optionB: Deploy Drone
          win:
            title: Correct!
            description: >
              You should not share unverified information, as this can intensify panic. 
              Instead, you used the drone effectively to gather more information and assess the situation more accurately.
          fail:
            title: That Was Not a Good Decision
            description: >
              <strong>Communicating unverified information too early intensifies panic.</strong>

              <div class="spacer"></div>
              Even sharing it internally with the fire department and police can trigger premature or misguided actions.
        coord-selection:
          title: Select the Drone Deployment Area
          submit: Check Deployment Area
          question: >
            <strong>Review the social media posts</strong> to assess where a breach in the flood protection system is most likely

            <div class="spacer"></div>
            <strong>Then tap a location on the map to send the drone there.</strong>

          win:
            title: Correct!
            description: >
              You deployed the drone in a relevant area and thereby gathered important data on the current situation.

              <div class="spacer"></div>
              <strong>The rumors about the Old Harbor were indeed correct - the area is completely flooded!</strong>
          fail:
            title: Failed
            description: >
              You deployed the drone in an irrelevant area and thereby wasted valuable resources

              <div class="spacer"></div>
              <strong>Review the social media posts</strong>, to assess where a breach in the flood protection system is most likely.
        who-you-wanna-call:
          title: Pass On Information
          question: <strong>Who would you share the verified information with first?</strong>
          optionA: Fire Department Incident Command
          optionB: Public
          win:
            title: Challenge Solved!
            description: >
              You passed on the information in a way that enables operational units to act more effectively without unnecessarily escalating the situation

              <div class="spacer"></div>
              Your decisions closed a critical information gap, <strong>and emergency responders are now better able to act.</strong>
          fail:
            title: Failed
            description: >
              Sharing the information with the public too early intensifies panic

              <div class="spacer"></div>
              <strong>Emergency responders urgently need precise information in order to initiate a meaningful response.</strong>

