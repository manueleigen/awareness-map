layers:
  base_map:
    title: City Map
    description: >
      Spatial context and orientation. The basis for interpreting all other layers.

  base_layer_glow:
    title: Building Glow
    description: >
      A visual effect that highlights important buildings and improves map readability in dark mode.

  critical_places:
    title: Critical Places
    description: >
      Important reference points in the urban area. Especially relevant for the
      fire brigade and crisis staff, secondarily for police decisions.

  population_density:
    title: Population Density
    description: >
      Shows where many people are located. Relevant for life risk, evacuation
      planning, and prioritization.

  flood_simulation:
    title: Flood Simulation
    description: >
      Shows how the flooding develops over time and supports the assessment of
      access loss and evolving risks.

  emergency_calls:
    title: Emergency Calls
    description: >
      Location-based reports from affected areas. The central input for the fire
      brigade challenge.

  social_media:
    title: Social Media
    description: >
      Public signals, observations, and reactions. Especially relevant for
      police and crisis staff.

  evacuation_zones:
    title: Evacuation Zones
    description: >
      Marked or defined areas for evacuation and protective measures.

  road_closures:
    title: Road Network / Closures
    description: >
      Information on accessibility, blockages, and critical connections.

  drone_feed:
    title: Drone Data
    description: >
      Additional aerial situation assessment to reduce uncertainty.

  infrastructure_status:
    title: Infrastructure Status
    description: >
      Information on the condition of important facilities and protective structures.

feedback:
  success_title: Task completed successfully
  failure_title: Task not completed successfully
  retry: Try again
  continue: Continue

completion:
  headline: Situation Assessed
  description: >
    You made decisions based on a dynamic and incomplete situation picture.
    Situation awareness is never complete; it must be actively constructed and
    continuously updated.
  restart_button: Restart scenario
  home_button: Back to home