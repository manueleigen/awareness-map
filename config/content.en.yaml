home:
  headline: Do you have the situation in view?
  description: >
    In a crisis, it is important to make good decisions based on data.
    What matters is often where something has happened, where many people are
    located, and which resources are available. Choose a scenario.
  scenario_selection_label: Choose a scenario

scenarios:
  flood:
    title: Flood in the City
    short_title: Flood
    description: >
      After days of heavy rainfall, the river overflows its banks. Water levels
      are expected to rise further, and existing protection measures may not be
      sufficient. Choose your role.
    role_selection_label: Choose your role

  blackout:
    title: Blackout
    short_title: Blackout
    description: >
      A large-scale power outage affects communication, supply systems, and
      mobility. Information is incomplete, digital systems partly fail, and
      decisions must be made under high time pressure.
    role_selection_label: Choose your role

  mass_event:
    title: Mass Event
    short_title: Mass Event
    description: >
      A large event with many people requires continuous awareness of movement,
      bottlenecks, risks, and available resources. Choose your role.
    role_selection_label: Choose your role

roles:
  fire_brigade:
    title: Fire Brigade
    short_description: >
      You make operational decisions under time pressure and must assess where
      help can still be effective and reachable.

  police:
    title: Police
    short_description: >
      You coordinate evacuations and must ensure that routes remain usable and
      critical infrastructure stays accessible.

  crisis_staff:
    title: Crisis Staff
    short_description: >
      You keep an overview of the overall situation, reduce uncertainty, and
      decide when information should be shared internally or publicly.

role_intro:
  flood:
    fire_brigade:
      headline: Rescue Under Time Pressure
      description: >
        Multiple emergency-call hotspots appear while water levels are rising.
        Some areas are already too dangerous to reach, others will soon become
        inaccessible, while others are urgent but still manageable. You can only
        handle two hotspots.
      role_label: Role
      role_value: Operational fire brigade unit
      task_overview_label: Your task
      task_overview: >
        Compare emergency calls with the timeline of the flooding and select
        exactly two reachable and urgent hotspots.
      start_button: Start as Fire Brigade

    police:
      headline: Evacuation with Consequences
      description: >
        Flooding threatens densely populated areas. A hospital depends on
        uninterrupted road access. Several evacuation options appear similarly
        urgent, but only one zone can be defined.
      role_label: Role
      role_value: Police evacuation and safety coordination
      task_overview_label: Your task
      task_overview: >
        Identify a threatened area, define an evacuation zone, and check whether
        routes remain passable and critical infrastructure stays accessible.
      start_button: Start as Police

    crisis_staff:
      headline: Deciding Under Uncertainty
      description: >
        During the ongoing response, a possible dike or flood protection breach
        is reported. The situation picture may be outdated or misleading. You
        need to reduce uncertainty and decide when and with whom information
        should be shared.
      role_label: Role
      role_value: Central crisis coordination and decision support
      task_overview_label: Your task
      task_overview: >
        Identify the main uncertainty, deploy a drone for data collection, and
        decide when uncertain or confirmed information should be communicated to
        fire brigade, police, or the public.
      start_button: Start as Crisis Staff

challenges:
  flood:
    fire_brigade:
      headline: Rescue Under Time Pressure
      difficulty: easy
      key_insight_label: Key insight
      key_insight: >
        Acting in time requires anticipating what is still feasible, not simply
        reacting to high call volumes.
      description: >
        Multiple emergency-call hotspots appear while water levels are rising.
        Some areas are already too dangerous to reach, others will soon become
        inaccessible, while others are urgent but still manageable. Only two
        hotspots can be handled.
      tasks_label: Tasks
      tasks:
        - Compare emergency calls with the timeline of the flooding.
        - Identify reachable urgent areas.
        - Select exactly two hotspots.
      map_instruction: Select exactly two hotspots.
      hotspot_categories_label: Hotspot categories
      hotspot_categories:
        a:
          title: Too late
          description: >
            Flooded in about 30 minutes. Do not select.
          example: >
            Ground floors are filling with water, access roads already affected.
        b:
          title: Now or never
          description: >
            Cut off in about 120 minutes. Select.
          example: >
            Only access route, vulnerable residents reported.
        c:
          title: Urgent but manageable
          description: >
            Flooded in about 60 to 90 minutes. Select one.
          example: >
            Basements filling up, rising water on streets.
        d:
          title: Loud but not urgent
          description: >
            High call volume, but still dry for at least 120 minutes.
            Do not select.
          example: >
            Many calls, water approaching, area still safe.
      success_criteria_label: Success criteria
      success_criteria:
        - Category B selected.
        - One category C selected.
        - Categories A and D avoided.
      success_feedback_label: On success
      success_feedback: >
        You did not simply react to noise, but correctly assessed the remaining
        time window. This allows response units to be deployed where they can
        still make a difference.
      failure_feedback_label: On failure
      failure_feedback:
        - Response units are surprised by the water in category A.
        - Access windows close if category B is ignored.
        - Selecting only non-urgent hotspots makes missed intervention opportunities visible.

    police:
      headline: Evacuation with Consequences
      difficulty: medium
      key_insight_label: Key insight
      key_insight: >
        Evacuations only work if routes remain usable and critical infrastructure
        stays accessible. Strong panic signals do not necessarily point to the
        best evacuation decision.
      description: >
        Flooding threatens densely populated areas. A hospital depends on
        uninterrupted road access. Several evacuation options appear equally
        urgent in terms of population and flood risk, but only one evacuation
        zone can be defined.
      tasks_label: Tasks
      tasks:
        - Identify short-term flood risk and population density.
        - Draw an evacuation zone.
        - Check route feasibility.
        - Consider the impact on hospital access and public reaction.
      map_instruction: Define one evacuation zone.
      success_criteria_label: Success criteria
      success_criteria:
        - The evacuation covers a high-risk populated area.
        - Routes remain passable.
        - Hospital access is secured.
        - Public reaction remains manageable.
      success_feedback_label: On success
      success_feedback: >
        You considered risk, accessibility, and system effects together. The
        zone protects a threatened area without unnecessarily blocking central
        connections.
      failure_feedback_label: On failure
      failure_feedback:
        - The evacuation zone becomes isolated and movement comes to a halt.
        - Hospital access routes are blocked; surrounding areas show growing instability.
        - Evacuation is triggered too early and resources are wasted.

    crisis_staff:
      headline: Deciding Under Uncertainty
      difficulty: hard
      key_insight_label: Key insight
      key_insight: >
        Situation awareness is incomplete and must be actively curated,
        especially under uncertainty.
      description: >
        During the ongoing response, a possible dike or flood protection breach
        is reported. The situation picture may be outdated or misleading. The
        crisis staff must reduce uncertainty and decide when and with whom
        information should be shared.
      tasks_label: Tasks
      tasks:
        - Identify the main uncertainty.
        - Deploy a drone for data collection.
        - Decide when information should be shared.
        - Decide with whom information should be communicated.
      map_instruction: Deploy a drone and decide on communication.
      success_criteria_label: Success criteria
      success_criteria:
        - The drone was deployed in the relevant area.
        - Confirmed information was shared with operational actors.
        - Public communication avoids unnecessary panic.
        - The situation picture stabilizes locally.
      success_feedback_label: On success
      success_feedback: >
        You prioritized the right information gap, gathered additional data, and
        shared information in a way that helps operational units act more
        effectively without unnecessarily escalating the situation.
      failure_feedback_label: On failure
      failure_feedback:
        - Early public communication increases panic.
        - Early internal sharing triggers premature or misdirected preparations.
        - Withholding confirmed information leaves response units acting on outdated assumptions.

