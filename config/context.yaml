# Project Context Mapping
# z_index: Reihenfolge aus layers.yaml (1=unten, 14=oben).
# Map layers unter UI-Elementen (z-index 2000+).

contexts:
  global:
    layers:
      base_layer_buildings:
        src: /assets/challenges/buildings.webp
        initially_visible: true
        z_index: 60

      base_layer_river:
        src: /assets/challenges/base-layer_river.webp
        initially_visible: true
        z_index: 10

      base_layer_streets:
        src: /assets/challenges/streets.webp
        initially_visible: true
        z_index: 71

      base_layer_glow:
        src: /assets/challenges/glow.webp
        icon: /assets/icons/default_icon.svg
        initially_visible: true
        z_index: 40

      critical_sites:
        src: /assets/challenges/flood/critical_sites.json
        icon: /assets/icons/critical_sites.svg
        poi_icon: /assets/icons/marker_poi.svg
        initially_visible: false
        z_index: 110
        title: { de: "Kritische Infrastruktur", en: "Critical Infrastructure" }

      population_density:
        src: /assets/challenges/population_density.png
        icon: /assets/icons/population_density.svg
        initially_visible: false
        z_index: 70
        title: { de: "Bevölkerungsdichte", en: "Population density" }

  scenarios:
    flood:
      layers:
        flood_simulation:
          src: /assets/challenges/flood/flood_simulation.json
          icon: /assets/icons/flood.svg
          slider_icon: /assets/icons/flood-slider.svg
          initially_visible: true
          z_index: 78
          title: { de: "Flutsimulation", en: "Flood simulation" }

      roles:
        fire_brigade:
          quiz: false
          exclude_layers: [evacuation_zones]
          layers:
            emergency_calls:
              src: /assets/challenges/flood/fire_brigade/emergency_calls.json
              icon: /assets/icons/emergency_calls.svg
              poi_icon: /assets/icons/marker_emergency_call.svg
              initially_visible: false
              z_index: 100
              title: { de: "Notrufe", en: "Emergency calls" }

            emergency_vehicles:
              src: /assets/challenges/flood/fire_brigade/emergency_vehicles.json
              icon: /assets/icons/ambulance.svg
              poi_icon: /assets/icons/marker_ambulance.svg
              initially_visible: false
              z_index: 105
              title: { de: "Einsatzkräfte", en: "Emergency vehicles" }

        police:
          quiz: false
          layers:
            social_media_police:
              src: /assets/challenges/flood/police/social_media.json
              icon: /assets/icons/social_media.svg
              poi_icon: /assets/icons/marker_social_media.svg
              initially_visible: false
              z_index: 180
              title: { de: "Social Media", en: "Social Media" }

            evacuation_zones:
              src: /assets/challenges/flood/police/evacuation_zones.svg
              icon: /assets/icons/evacuation_zones.svg
              initially_visible: false
              z_index: 77
              title: { de: "Evakuierungszonen", en: "Evacuation zones" }

        crisis_staff:
          quiz: /assets/challenges/flood/crisis_staff/crises-challange.yaml
          exclude_layers: [evacuation_zones]
          layers:
            social_media_crises:
              src: /assets/challenges/flood/crisis_staff/social_media.json
              icon: /assets/icons/social_media.svg
              poi_icon: /assets/icons/marker_social_media.svg
              initially_visible: false
              z_index: 180
              title: { de: "Social Media", en: "Social Media" }

            drone_feed:
              src: /assets/challenges/flood/crisis_staff/drone-feed.png
              initially_visible: false
              quiz_only: true
              z_index: 190
              title: { de: "Drohnendaten", en: "Drone Data" }
              description: ## Nicht in verwendung..
                {
                  de: "Zusätzliche Lageeinschätzung aus der Luft zur Reduktion von Unsicherheit.",
                  en: "Additional aerial situation assessment to reduce uncertainty.",
                }

    blackout:
      inactive: true
      layers: false
      roles: false

    mass_event:
      inactive: true
      layers: false
      roles: false
