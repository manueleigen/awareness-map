# Project Context Mapping
# z_index: Reihenfolge aus layers.yaml (1=unten, 14=oben).
# Map layers unter UI-Elementen (z-index 2000+).

contexts:
  global:
    layers:
      base_layer_buildings:
        src: /assets/layers/buildings.webp
        initially_visible: true
        z_index: 60

      base_layer_river:
        src: /assets/layers/base-layer_river.webp
        initially_visible: true
        z_index: 10
        
      base_layer_streets:
        src: /assets/layers/streets.webp
        initially_visible: true
        z_index: 71

      base_layer_glow:
        src: /assets/layers/glow.webp
        icon: /assets/icons/default_icon.svg
        initially_visible: true
        z_index: 40

      critical_sites:
        src: /assets/layers/flood/critical_sites.json
        icon: /assets/icons/critical_sites.svg
        poi_icon: /assets/icons/marker_poi.svg
        initially_visible: false
        z_index: 110

      population_density:
        src: /assets/layers/population_density.png
        icon: /assets/icons/population_density.svg
        initially_visible: false
        z_index: 70

  scenarios:
    flood:
      layers:
        flood_simulation:
          src: /assets/layers/flood/flood_simulation.json
          icon: /assets/icons/flood.svg
          slider_icon: /assets/icons/flood-slider.svg
          initially_visible: true
          z_index: 78

      roles:
        fire_brigade:
          quiz: /config/quizes/crises-challange.yaml
          exclude_layers: [evacuation_zones]
          layers:
            emergency_calls:
              src: /assets/layers/flood/fire_brigade/emergency_calls.json
              icon: /assets/icons/emergency_calls.svg
              poi_icon: /assets/icons/marker_emergency_call.svg
              initially_visible: false
              z_index: 100

            emergency_vehicles:
              src: /assets/layers/flood/fire_brigade/emergency_vehicles.json
              icon: /assets/icons/default_icon.svg
              poi_icon: /assets/icons/marker_ambulance.svg
              initially_visible: false
              z_index: 105

        police:
          quiz: /config/quizes/crises-challange.yaml
          layers:
            social_media:
              src: /assets/layers/flood/police/social_media.json
              icon: /assets/icons/social_media.svg
              poi_icon: /assets/icons/marker_social_media.svg
              initially_visible: false
              z_index: 180

            evacuation_zones:
              src: /assets/layers/flood/police/evacuation_zones.svg
              icon: /assets/icons/evacuation_zones.svg
              initially_visible: false
              z_index: 77
              
        crisis_staff:
          quiz: /config/quizes/crises-challange.yaml
          exclude_layers: [evacuation_zones]
          layers:
            social_media:
              src: /assets/layers/flood/crisis_staff/social_media.json
              icon: /assets/icons/social_media.svg
              poi_icon: /assets/icons/marker_social_media.svg
              initially_visible: false
              z_index: 180
            
            drone_feed:
              src: /assets/layers/flood/flood_simulation.json # Or wherever drone feed comes from? Original had it in layers.yaml but not context.
              # Wait, drone_feed in original layers.yaml but I don't see it in config/context.yaml.
              # Refactor has it under crisis_staff. I'll use the src from refactor if provided, but refactor didn't have src for drone_feed.
              # Let me check layers.yaml again.
              # Original layers.yaml had drone_feed as static-image.
              # Refactor layers.yaml has drone_feed as static-image.
              # I'll check where the assets are.
              initially_visible: false
              z_index: 190

    blackout:
      layers: {}
      roles:
        fire_brigade:
          quiz: /config/quizes/crises-challange.yaml
        police:
          quiz: /config/quizes/crises-challange.yaml
        crisis_staff:
          quiz: /config/quizes/crises-challange.yaml

    mass_event:
      layers: {}
      roles:
        fire_brigade:
          quiz: /config/quizes/crises-challange.yaml
        police:
          quiz: /config/quizes/crises-challange.yaml
        crisis_staff:
          quiz: /config/quizes/crises-challange.yaml
