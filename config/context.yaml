# Project Context Mapping
# z_index: Reihenfolge aus layers.yaml (1=unten, 14=oben).
# Map layers unter UI-Elementen (z-index 2000+).

contexts:
  global:
    layers:
      base_layer_buildings:
        src: /assets/challenges/buildings.webp
        initially_visible: true
        z_index: 71
      base_layer_river:
        src: /assets/challenges/base-layer_river.webp
        initially_visible: true
        z_index: 10

      base_layer_streets:
        src: /assets/challenges/streets.webp
        initially_visible: true
        z_index: 60

      base_layer_glow:
        src: /assets/challenges/glow.webp
        icon: /assets/icons/default_icon.svg
        initially_visible: true
        z_index: 40

      location_coord_check:
        src: /assets/location_coord_check.jpg
        initially_visible: false
        z_index: 100

      critical_sites:
        src: /assets/challenges/flood/critical_sites.json
        icon: /assets/icons/critical_sites.svg
        poi_icon: /assets/icons/marker_poi.svg
        initially_visible: false
        z_index: 110
        toggle_order: 1
        title:
          { de: "Kritische\nInfrastruktur", en: "Critical\nInfrastructure" }

      population_density:
        src: /assets/challenges/density.webp
        icon: /assets/icons/population_density.svg
        initially_visible: false
        z_index: 74
        toggle_order: 2
        title: { de: "Bevölkerungs\ndichte", en: "Population\nDensity" }

  scenarios:
    blackout:
      inactive: true
      layers: false
      roles: false

    mass_event:
      inactive: true
      layers: false
      roles: false
