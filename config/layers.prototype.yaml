layer_types:
  static_image:
    type: static-image
    interaction: none

  locations:
    type: locations
    interaction: inspect-location
    icon_mode: per-location

  area_overlay:
    type: areas
    interaction: inspect-area

  timeline_animation:
    type: dynamic-image
    interaction: timeline
    playback_control: true

  pulsing_overlay:
    type: pulsing-image
    interaction: inspect-area
