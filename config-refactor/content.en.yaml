home:
  title: Do You Have the Situation in View?
  description: >
    In a crisis, it is important to make good decisions based on the most current information possible.
    What often matters is where something has happened, where many people are located,
    and which resources are available. Which scenario would you like to explore?
  scenario_1: Flood
  scenario_2: Blackout
  scenario_3: Mass Event

scenarios:
  flood:
    title: The River Overflows Its Banks
    description: >
      After days of rainfall, the water level keeps rising. It is expected that
      the river will overflow its banks and that the usual protection measures will not be enough.
      Not everyone involved has the same information, and the situation is developing quickly.
      Which role would you like to take on?
    challenge_selection_1: Fire Brigade
    challenge_selection_2: Police
    challenge_selection_3: Crisis Staff

  blackout:
    title: The Power Goes Out
    description: >
      A large-scale power outage affects communication, supply systems, and
      mobility. Information is incomplete, digital systems partly fail,
      and decisions must be made under high time pressure.
    challenge_selection_1: Fire Brigade
    challenge_selection_2: Police
    challenge_selection_3: Crisis Staff

  mass_event:
    title: Mass Event
    description: >
      An event with many people requires continuous awareness of
      movement, bottlenecks, risks, and available resources. Choose your role.
    challenge_selection_1: Fire Brigade
    challenge_selection_2: Police
    challenge_selection_3: Crisis Staff

challenges:
  flood:
    fire_brigade:
      title: Rescue Under Time Pressure
      intro: >
        Many emergency calls are coming in while the water level is rising.
        Compare emergency calls with the temporal progression of the flooding and identify
        two reachable and urgent hotspots.
      how-to: >
        Select exactly two hotspots that you want to handle.
        Consider how quickly they will be flooded,
        how many people are affected, and whether they are still reachable.
      success_feedback: >
        You did not simply react to volume, but correctly assessed the remaining
        time window. This allows response units to be deployed where
        they can still help effectively.
      failure_feedback_1:
        Response units are surprised by the water in category A.
      failure_feedback_2:
        Access windows close if category B is ignored.
      failure_feedback_3:
        Selecting only non-urgent hotspots makes missed intervention opportunities visible.

    police:
      title: Evacuation with Consequences
      intro: >
        Flooding threatens densely populated areas. Since police resources are limited,
        only two zones can initially be evacuated. Identify flood risks and save as many people as possible
        without blocking critical infrastructure or triggering unnecessary panic.
      how-to: >
        Select two zones on the map that you want to evacuate. Consider the flood risk, population density,
        and the accessibility of critical infrastructure.
      success_feedback: >
        You considered risk, accessibility, and system-wide effects together.
        The zones you selected protect endangered areas without unnecessarily
        blocking central connections.
      failure_feedback_1:
        The zone is flooded and people are put in danger.
      failure_feedback_2:
        The evacuation blocks access to the hospital; surrounding areas show increasing instability.
      failure_feedback_3:
        An evacuation is triggered too early and resources are wasted.

    crisis_staff:
      title: Deciding Under Uncertainty
      intro: >
        During the ongoing response, rumors are circulating on social media about a possible dike or
        flood protection breach. Decide which information to share and reduce uncertainty by collecting current data.
      how-to: >
        none?
      feedback: >
        You can share information, withhold it, or collect new data at any time.
        Consider which information gaps are most critical and how you can best close them to support response units without causing unnecessary panic.
      success_feedback: >
        You shared information in a way that allowed operational units to act better
        without unnecessarily escalating the situation, and you closed the information gap through data collection.
      failure_feedback_1:
        Early public communication increases panic.
        Early internal sharing triggers premature or misdirected preparations.
      failure_feedback_2:
        You deployed the drone in an irrelevant area and wasted resources as a result.
      failure_feedback_3:
        Withholding confirmed information leaves response units acting on outdated assumptions.

