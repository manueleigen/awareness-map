contexts:
  global:
    layers:
      base_layer_buildings:
        src: /assets/layers/buildings.webp
        initially_visible: true

      base_layer_river:
        src: /assets/layers/base-layer_river.webp
        initially_visible: true
        
      base_layer_streets:
        src: /assets/layers/streets.webp
        initially_visible: true

      base_layer_glow:
        src: /assets/layers/glow.webp
        icon: /assets/icons/default_icon.svg
        initially_visible: true

      critical_sites:
        src: /assets/layers/flood/critical_sites.json
        initially_visible: true

      population_density:
        src: /assets/layers/population_density.png
        initially_visible: false

  scenarios:
    flood:
      layers:
        flood_simulation:
          src: /assets/layers/flood/flood_simulation.json
          icon: /assets/icons/flood.svg
          slider_icon: /assets/icons/flood-slider.svg
          initially_visible: true

      roles:
        fire_brigade:
          layers:
            emergency_calls:
              src: /assets/layers/flood/fire_brigade/emergency_calls.json
              initially_visible: false

            emergency_vehicles:
              src: /assets/layers/flood/fire_brigade/emergency_vehicles.json
              initially_visible: false

        police:
          layers:
            social_media:
              src: /assets/layers/flood/police/social_media.json
              initially_visible: false

            evacuation_zones:
              src: /assets/layers/flood/police/evacuation_zones.svg
              initially_visible: false

        crisis_staff:
          layers:
            social_media:
              src: /assets/layers/flood/crisis_staff/social_media.json
              initially_visible: false

    blackout:
      layers: {}
      roles: {}

    mass_event:
      layers: {}
      roles: {}
